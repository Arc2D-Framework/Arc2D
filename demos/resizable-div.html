<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resizable Div Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .item {
        height: 50px;
        width: 50px;
        position: absolute;
        background: orange
        }
        .resizer {
        position: absolute;
        height: 10px;
        width: 10px;
        border-radius: 5px;
        background-color: black;
        z-index: 2;
        }
        .resizer.nw{
        top: -1px;
        left: -1px;
        cursor: nw-resize;
        }
        .resizer.ne{
        top: -1px;
        right: -1px;
        cursor: ne-resize;
        }
        .resizer.sw{
        bottom: -1px;
        left: -1px;
        cursor: sw-resize;
        }
        .resizer.se{
        bottom: -1px;
        right: -1px;
        cursor: se-resize;
        }
        
    </style>

    <script>
    class Resizable {
        constructor(element) {
            this.el = element;
            this.isResizing = false;
            this.currentResizer = null;
            this.prevX = 0;
            this.prevY = 0;
            this.init();
        }

        init() {
            // Make sure the element is absolutely positioned
            this.el.style.position = 'absolute';
            // Drag to move
            this.el.addEventListener('mousedown', this.onMouseDown.bind(this));
            // Resizers
            const resizers = this.el.querySelectorAll('.resizer');
            resizers.forEach(resizer => {
                resizer.addEventListener('mousedown', this.onResizeMouseDown.bind(this, resizer));
            });
        }

        onMouseDown(e) {
            // Only move if not clicking a resizer
            if (e.target.classList.contains('resizer')) return;
            e.preventDefault();
            this.isResizing = false;
            this.prevX = e.clientX;
            this.prevY = e.clientY;
            this._moveHandler = this.onMouseMove.bind(this);
            this._upHandler = this.onMouseUp.bind(this);
            window.addEventListener('mousemove', this._moveHandler);
            window.addEventListener('mouseup', this._upHandler);
        }

        onMouseMove(e) {
            if (this.isResizing) return;
            const rect = this.el.getBoundingClientRect();
            let newX = this.prevX - e.clientX;
            let newY = this.prevY - e.clientY;
            this.el.style.left = rect.left - newX + 'px';
            this.el.style.top = rect.top - newY + 'px';
            this.prevX = e.clientX;
            this.prevY = e.clientY;
        }

        onMouseUp() {
            window.removeEventListener('mousemove', this._moveHandler);
            window.removeEventListener('mouseup', this._upHandler);
        }

        onResizeMouseDown(resizer, e) {
            e.preventDefault();
            this.isResizing = true;
            this.currentResizer = resizer;
            this.prevX = e.clientX;
            this.prevY = e.clientY;
            this._resizeMoveHandler = this.onResizeMouseMove.bind(this);
            this._resizeUpHandler = this.onResizeMouseUp.bind(this);
            window.addEventListener('mousemove', this._resizeMoveHandler);
            window.addEventListener('mouseup', this._resizeUpHandler);
        }

        onResizeMouseMove(e) {
            const rect = this.el.getBoundingClientRect();
            let style = window.getComputedStyle(this.el);
            let left = parseFloat(style.left) || rect.left;
            let top = parseFloat(style.top) || rect.top;
            let width = rect.width;
            let height = rect.height;
            let dx = e.clientX - this.prevX;
            let dy = e.clientY - this.prevY;
            if (this.currentResizer.classList.contains('se')) {
                this.el.style.width = width + dx + 'px';
                this.el.style.height = height + dy + 'px';
            } else if (this.currentResizer.classList.contains('sw')) {
                this.el.style.width = width - dx + 'px';
                this.el.style.height = height + dy + 'px';
                this.el.style.left = left + dx + 'px';
            } else if (this.currentResizer.classList.contains('ne')) {
                this.el.style.width = width + dx + 'px';
                this.el.style.height = height - dy + 'px';
                this.el.style.top = top + dy + 'px';
            } else if (this.currentResizer.classList.contains('nw')) {
                this.el.style.width = width - dx + 'px';
                this.el.style.height = height - dy + 'px';
                this.el.style.top = top + dy + 'px';
                this.el.style.left = left + dx + 'px';
            }
            this.prevX = e.clientX;
            this.prevY = e.clientY;
        }

        onResizeMouseUp() {
            window.removeEventListener('mousemove', this._resizeMoveHandler);
            window.removeEventListener('mouseup', this._resizeUpHandler);
            this.isResizing = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const el = document.querySelector('.item');
        if (el) new Resizable(el);
    });
    </script>

</head>
<body>
    <button onclick="alert('Clicked through div')">Show Resizable Div</button>
    <div class="item"> 
        <div class="resizer ne"> </div>
        <div class="resizer nw"> </div>
        <div class="resizer sw"> </div>
        <div class="resizer se"> </div>
    </div>
</body>
</html>
